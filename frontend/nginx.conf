server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed assets aggressively; Vite produces hashed filenames.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so the React router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html so users get new bundles after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Slightly larger upload limit so the 10 MB log uploads aren't cut off
    # if someone ever puts the API behind this nginx via reverse proxy.
    client_max_body_size 12m;
}
