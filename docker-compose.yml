# Run the entire stack locally with:    docker compose up --build
# Tear it down (keeping data) with:      docker compose down
# Tear it down + wipe volumes with:      docker compose down -v
#
# Services:
#   postgres  -- database (data persisted in the `pgdata` volume)
#   api       -- Go HTTP API on http://localhost:8080
#   worker    -- Go background worker (no exposed port, polls the DB)
#   frontend  -- nginx serving the built React SPA on http://localhost:5173
#
# api and worker share the `uploads` volume so the worker can read the
# files the API wrote. Do not split this volume.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyber_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple_log_analyser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_log_analyser"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: cyber_app_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_MODE: api
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/simple_log_analyser?sslmode=disable
      UPLOAD_DIR: /data/uploads
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SESSION_TTL: 2h
      # Optional AI providers — leave empty to disable.
      GEMINI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
    volumes:
      - uploads:/data/uploads
    ports:
      - "8080:8080"

  worker:
    build:
      context: ./backend
    container_name: cyber_app_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["worker"]
    environment:
      APP_ENV: development
      APP_MODE: worker
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/simple_log_analyser?sslmode=disable
      UPLOAD_DIR: /data/uploads
      GEMINI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
    volumes:
      - uploads:/data/uploads

  frontend:
    build:
      context: ./frontend
      args:
        # Browsers talk to the API on the host port, not the docker network name.
        VITE_API_BASE_URL: http://localhost:8080
    container_name: cyber_app_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
